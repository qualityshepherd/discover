name = "your-worker-name"
main = "worker/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "assets"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

[vars]
DOMAIN_NAME = "your.domain.com"
OWNER = ""  # leave blank — deploy first, go to /admin, derive your pubkey, paste it here, redeploy

[[kv_namespaces]]
binding = "DISCOVER_KV"
id = ""  # wrangler kv namespace create DISCOVER_KV

[[durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AnalyticsDO"]

[[r2_buckets]]
binding = "R2"
bucket_name = ""  # create a bucket in the Cloudflare dashboard and paste its name here

[triggers]
crons = ["0,42 * * * *"]

[observability]
enabled = true

[observability.logs]
enabled = true
