name = "discover-brine-dev"
main = "worker/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "assets"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

[vars]
DOMAIN_NAME = "discover.brine.dev"
OWNER = "RmVJCoY3YwOUpTX1trziLMRTPD1MjdpE6etDXtrgEqg"  # paste your pubkey here after deriving it at /admin

[[kv_namespaces]]
binding = "DISCOVER_KV"
id = "5ba3319ac1304f2fabc391fcbbae65ca"

[[durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AnalyticsDO"]

[[r2_buckets]]
binding = "R2"
bucket_name = "discover-brine-dev"

[triggers]
crons = ["0,42 * * * *"]

[observability]
enabled = true

[observability.logs]
enabled = true
