<body>
<div id="app">
  <header>
    <a href="/">
      <svg class="site-logo" aria-label="discover" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 465 100">
        <circle cx="50" cy="50" r="41" fill="none" stroke="currentColor" stroke-width="2" opacity="0.18"/>
        <polygon points="50,7 55.5,49 50,55 44.5,49" fill="currentColor"/>
        <polygon points="50,93 44.5,51 50,45 55.5,51" fill="currentColor" opacity="0.25"/>

        <text x="112" y="88" font-family="header, Oswald, sans-serif" font-weight="600" font-size="96" fill="currentColor">discover</text>
      </svg>
    </a>
    <nav>
      <a href="/feed">my feed</a>

      <button id="btn-theme" title="Toggle light/dark mode" aria-label="Toggle theme"></button>
    </nav>
  </header>

  <main class="container">

    <h1 class="sr-only">discover</h1>

    <!-- browse view -->
    <div id="view-browse">
      <div class="discover-header">
        <label for="discover-search" class="sr-only">Search feeds</label>
        <input type="text" id="discover-search" placeholder="search feeds…" autocomplete="off">
        <button id="btn-random" class="btn btn-sm" title="Shuffle playlist order" aria-label="Shuffle playlist order">random</button>
        <button id="btn-new" class="btn btn-sm" title="Recently added sources" aria-label="Recently added sources">new</button>
      </div>
      <div id="tag-cloud"></div>
      <div id="discover-cards"></div>
    </div>

    <!-- playlist/feed view -->
    <div id="view-playlist" class="hidden">
      <div class="discover-playlist-header">
        <div class="discover-playlist-meta">
          <h2 id="playlist-title"></h2>
          <p id="playlist-description" class="muted"></p>
          <div id="playlist-tags" class="discover-tags"></div>
        </div>
        <button id="btn-follow-playlist" class="btn btn-sm btn-follow">+ follow</button>
        <button id="btn-rss-playlist" class="btn btn-sm" title="Copy RSS feed URL" aria-label="Copy RSS feed URL">rss</button>
      </div>
      <div id="playlist-feed"></div>
    </div>

  </main>
</div>

<!-- feed item modal (injected by JS) -->

<script type="module" src="/discover/discover.js"></script>
</body>
</html>
